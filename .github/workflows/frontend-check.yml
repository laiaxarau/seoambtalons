name: Validació Completa (Codi + SEO)
on:
  pull_request:
    branches: [devel, main]

jobs:
  check_everything:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Baixar el codi
        uses: actions/checkout@v4

      - name: 2. Instal·lar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 3. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 4. Instal·lar dependències
        run: pnpm install --no-frozen-lockfile

      - name: 5. Validacions de codi (TS + Astro)
        run: |
          pnpm astro sync
          pnpm run typecheck
          pnpm run check

      - name: 6. Generar Build per a Lighthouse
        run: pnpm run build

      - name: 🚀 7. Audit de Lighthouse (SEO)
        continue-on-error: true
        run: |
          pnpm exec lhci collect --static-dist-dir=./dist
          pnpm exec lhci assert --assertions.categories:seo=error --assertions.categories:performance=error
